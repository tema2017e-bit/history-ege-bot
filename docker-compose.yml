services:
  # PostgreSQL база данных
  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: history_ege
      POSTGRES_USER: history_ege
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U history_ege"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Telegram бот + API
  bot:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://history_ege:${DB_PASSWORD:-changeme}@db:5432/history_ege
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BOT_USERNAME: ${BOT_USERNAME:-history_ege_bot}
      MINI_APP_URL: ${MINI_APP_URL:-https://history-ege.vercel.app}
      ADMIN_ID: ${ADMIN_ID:-0}
      ADMIN_API_SECRET: ${ADMIN_API_SECRET:-admin-secret-2024}
      API_PORT: 3000
      YUKASSA_SHOP_ID: ${YUKASSA_SHOP_ID}
      YUKASSA_SECRET_KEY: ${YUKASSA_SECRET_KEY}
      EXTERNAL_URL: ${EXTERNAL_URL}
      # SOCKS5 прокси на хосте для доступа к Telegram API
      SOCKS_PROXY: socks5://172.19.0.1:1080

volumes:
  postgres_data: