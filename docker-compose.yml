services:
  # PostgreSQL база данных
  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: history_ege
      POSTGRES_USER: history_ege
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U history_ege"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # Telegram бот + API
  bot:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://history_ege:${DB_PASSWORD:-changeme}@db:5432/history_ege
      SOCKS_PROXY: socks5://172.19.0.1:1080
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge