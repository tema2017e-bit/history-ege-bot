name: history-ege-bot
service:
  name: telegram-bot
  instance_type: free
  port: 3000
  source:
    docker:
      image: null
      dockerfile: server/Dockerfile
    git:
      branch: main
      directory: server
  env:
    - key: TELEGRAM_BOT_TOKEN
      value: ""
    - key: MINI_APP_URL
      value: "https://history-ege.vercel.app"
    - key: ADMIN_API_SECRET
      value: ""
    - key: API_URL
      value: "https://history-ege.vercel.app"